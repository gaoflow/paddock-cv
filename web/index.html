<style>
  :root{
	    --bg:#090c11; --bg2:#0b1017; --card:#0f141b; --card2:#151c26; --card3:#1b2532;
	    --line:#2a3545; --line2:#3b4758;
	    --txt:#f4f7fb; --muted:#94a3b8; --muted2:#728096;
    --red:#e8002d; --accent:#ff8000;
    --hi:#37d67a; --med:#ffb020; --lo:#ff5a5a;
    --a1:#ff8000; --a2:#36a2ff; --a3:#b06bff; --a4:#37d67a; --a5:#ff5a8a; --a6:#7a8aa0;
    --mono:'SF Mono',ui-monospace,'JetBrains Mono',Menlo,Consolas,monospace;
    --sans:'Inter','PingFang SC','Hiragino Sans GB','Microsoft YaHei',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
	  body{
	    background:linear-gradient(180deg,#090d13 0%,#080b10 100%);
	    color:var(--txt); font-family:var(--sans); line-height:1.5;
	    -webkit-font-smoothing:antialiased;
	  }
	  a{color:inherit}
	  .wrap{max-width:1440px;margin:0 auto;padding:0 24px}
  .zh{color:var(--muted);font-weight:500;font-size:.84em;margin-left:5px;letter-spacing:0}

	  header.top{
	    border-bottom:1px solid var(--line);
	    background:rgba(7,10,15,.88);
	    backdrop-filter:blur(14px); position:sticky; top:0; z-index:40;
	    box-shadow:0 12px 30px rgba(0,0,0,.22);
	  }
	  .top .wrap{display:grid;grid-template-columns:auto minmax(330px,1fr) minmax(260px,360px);align-items:center;gap:18px;padding-top:10px;padding-bottom:10px}
	  .logo{display:flex;align-items:center;gap:12px}
	  .logo .bars{display:flex;gap:3px}
	  .logo .bars span{width:5px;height:29px;border-radius:2px;display:block;transform:skewX(-16deg);box-shadow:0 0 18px rgba(255,128,0,.18)}
	  .logo h1{font-size:19.8px;margin:0;letter-spacing:0;font-weight:900}
	  .logo .sub{font-size:11.5px;color:var(--muted2);font-family:var(--mono);letter-spacing:.2px;margin-top:1px}
	  .tabs{display:flex;gap:4px;justify-self:end;padding:3px;border:1px solid var(--line);border-radius:8px;background:rgba(13,18,26,.7)}
	  .tab{
	    font-size:14.3px;letter-spacing:.4px;color:var(--muted);
	    background:transparent;border:1px solid transparent;padding:7px 14px;border-radius:6px;cursor:pointer;transition:.15s;
	  }
	  .tab:hover{color:var(--txt);background:rgba(255,255,255,.045)}
	  .tab.on{color:#080b10;background:var(--accent);border-color:var(--accent);font-weight:800}
	  .langsel{font-size:12.6px;font-family:var(--mono);color:var(--muted);background:rgba(13,18,26,.7);border:1px solid var(--line);border-radius:6px;padding:6px 8px;cursor:pointer;outline:none;margin-left:4px}
  .langsel:hover,.langsel:focus-visible{color:var(--txt);border-color:var(--line2)}
  .searchbox{display:flex;align-items:center;gap:7px;color:var(--muted2);background:rgba(13,18,26,.76);border:1px solid var(--line);border-radius:8px;padding:0 10px;height:36px;min-width:0;width:100%}
	  .searchbox span{font-family:var(--mono);font-size:13px;color:var(--accent)}
	  .search{
	    font-size:13.4px;color:var(--txt);background:transparent;
	    border:0;padding:0;width:100%;outline:none;
	  }
	  .searchbox:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(54,162,255,.12)}
	  .search::placeholder{color:var(--muted2)}

  .hero{padding:26px 0 6px}
  .hero h2{font-size:27.5px;margin:0 0 8px;font-weight:800;letter-spacing:-.2px}
  .hero p{color:var(--muted);margin:0 0 22px;max-width:780px;font-size:16px}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .stat{
    background:linear-gradient(160deg,var(--card),var(--bg2));
    border:1px solid var(--line);border-radius:8px;padding:16px 18px;position:relative;overflow:hidden;
  }
  .stat .n{font-size:33px;font-weight:800;font-family:var(--mono);letter-spacing:-1px}
  .stat .l{font-size:13.2px;color:var(--muted);letter-spacing:.4px;margin-top:3px}
  .stat .h{font-size:13.2px;color:var(--muted2);margin-top:7px}

  section.view{padding:26px 0 60px;display:none}
  section.view.on{display:block}

  .teamgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(370px,1fr));gap:16px}
  .team{background:var(--card);border:1px solid var(--line);border-radius:8px;overflow:hidden;transition:.15s}
  .team:hover{border-color:var(--line2)}
  .team .hd{display:flex;align-items:center;gap:11px;padding:14px 16px;border-bottom:1px solid var(--line);position:relative}
  .team .hd .stripe{position:absolute;left:0;top:0;bottom:0;width:5px}
  .team .hd .nm{font-weight:800;font-size:17.1px;letter-spacing:.2px}
  .team .hd .dr{font-size:12.7px;color:var(--muted);font-family:var(--mono);margin-top:2px;line-height:1.5}
  .team .body{padding:8px}
  .eng{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;cursor:pointer;transition:.13s;border:1px solid transparent}
  .eng:hover{background:var(--card2);border-color:var(--line)}
  .eng .av{width:58px;height:58px;border-radius:11px;flex:0 0 58px;display:grid;place-items:center;font-family:var(--mono);font-weight:700;font-size:19.8px;color:#0a0c10;background-size:cover;background-position:center top;background-repeat:no-repeat}
  .eng .meta{min-width:0;flex:1}
  .eng .en{font-weight:800;font-size:15.8px;color:var(--txt);line-height:1.35;overflow-wrap:anywhere}
  .eng .en .zh{color:#d3dbe8;font-weight:600}
  .eng .aka{color:var(--muted);font-family:var(--mono);font-size:12.1px;margin-left:6px}
  .eng .er{font-size:12.9px;color:var(--muted);margin-top:3px}
  .eng .etags{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:8px}
  .eng .arrow{color:var(--muted2);font-size:19.8px;transition:.13s}
  .eng:hover .arrow{color:var(--accent);transform:translateX(2px)}

  .cdot{width:7px;height:7px;border-radius:50%;display:inline-block;flex:0 0 7px}
  .cdot.high{background:var(--hi)} .cdot.medium{background:var(--med)} .cdot.low{background:var(--lo)}
  .badge{font-size:12.1px;letter-spacing:.2px;padding:2px 8px;border-radius:20px;border:1px solid var(--line2);color:var(--muted);white-space:nowrap}
  .abadge{font-size:11.6px;padding:2px 9px;border-radius:20px;font-weight:600;white-space:nowrap}
  .confbadge{font-size:11.6px;font-weight:700;border-radius:20px;padding:2px 9px;white-space:nowrap;border:1px solid var(--line2)}
  .confbadge.high{color:#d8ffe8;border-color:var(--hi);background:rgba(55,214,122,.14)}
  .confbadge.medium{color:#fff0c2;border-color:var(--med);background:rgba(255,176,32,.14)}
  .confbadge.low{color:#ffd7d7;border-color:var(--lo);background:rgba(255,90,90,.14)}
  /* age — its own accent token so it stands out from role text & grey badges */
  .agetag{font-size:11.6px;font-weight:700;font-family:var(--mono);color:var(--accent);
    border:1px solid var(--accent);background:rgba(255,128,0,.10);padding:2px 9px;border-radius:20px;white-space:nowrap;flex:0 0 auto}
  .agechip{display:inline-flex;align-items:center;gap:6px;font-size:12.7px;font-weight:600;color:var(--accent);
    border:1px solid var(--accent);background:rgba(255,128,0,.12);padding:3px 11px;border-radius:20px;white-space:nowrap}
  .agechip .al{font-size:.82em;font-weight:500;color:var(--muted);letter-spacing:.5px}
  .agechip b{font-family:var(--mono);font-size:1.12em}
  .dh .agewrap{margin-top:13px}

  .rgrid{display:grid;grid-template-columns:1fr;gap:18px;align-items:start}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:20px}
  .panel h3{margin:0 0 14px;font-size:20px;letter-spacing:.2px}
  .panel .ph{font-size:15px;color:var(--muted);margin:0 0 16px}
  .bar{margin-bottom:14px}
  .bar .bl{display:flex;justify-content:space-between;align-items:baseline;font-size:13.8px;margin-bottom:5px;gap:10px}
  .bar .bl .bn{font-weight:600;white-space:nowrap}
  .bar .bl .bd{color:var(--muted);font-size:12.1px;text-align:right;line-height:1.4}
  .bar .track{height:10px;background:var(--bg2);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .bar .fill{height:100%;border-radius:6px}
  .bar .cnt{font-family:var(--mono);font-size:12.1px;color:var(--muted);margin-left:8px}

  .uni{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--line);gap:10px}
  .uni:last-child{border-bottom:0}
  .uni .un{font-size:14.3px}.uni .uc{font-family:var(--mono);font-size:13.2px;color:var(--accent);white-space:nowrap}

  .playbook{background:linear-gradient(160deg,#13202a,#11161f);border:1px solid var(--line2)}
  .step{display:flex;gap:14px;padding:12px 0;border-bottom:1px dashed var(--line)}
  .step:last-child{border-bottom:0}
  .step .num{font-family:var(--mono);font-weight:800;font-size:15.4px;color:#0a0c10;background:var(--accent);width:26px;height:26px;border-radius:7px;display:grid;place-items:center;flex:0 0 26px}
  .step .st{font-weight:700;font-size:14.9px;margin-bottom:2px}
  .step .sd{font-size:13.8px;color:var(--muted)}
  .ydist{display:flex;align-items:flex-end;gap:6px;height:90px;margin-top:6px}
  .ydist .yb{flex:1;background:linear-gradient(180deg,var(--accent),#a85200);border-radius:4px 4px 0 0;min-height:3px;position:relative}
  .ydist .yb span{position:absolute;top:-17px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .ydist .yb i{position:absolute;bottom:-19px;left:0;right:0;text-align:center;font-size:11.6px;color:var(--muted2);font-style:normal}
  .pathchart{width:100%;overflow:hidden}
  .pathchart svg{display:block;width:100%;min-width:620px;height:auto}
  .axis{stroke:var(--line2);stroke-width:1}
  .gridline{stroke:var(--line);stroke-width:1;stroke-dasharray:3 5}
  .charttext{font-size:11.6px;fill:var(--muted);font-family:var(--mono)}
  .chartlabel{font-size:12.1px;fill:var(--txt);font-weight:700}
  .chartnote{font-size:13.2px;color:var(--muted);margin-top:10px;line-height:1.6}
	  .boardblock{margin-bottom:30px}
	  .workbench{display:block}
	  .workmain{min-width:0}
	  .boardhead{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;border:1px solid var(--line);border-radius:8px;padding:14px 16px;margin-bottom:12px;background:linear-gradient(180deg,rgba(17,24,36,.92),rgba(10,14,21,.74))}
	  .boardhead h3{margin:0;font-size:19px;letter-spacing:0;font-weight:900}
	  .boardhead p{margin:4px 0 0;color:var(--muted);font-size:13.6px;line-height:1.5;max-width:780px}
	  .quickfilters{display:flex;align-items:center;justify-content:flex-end;gap:7px;flex-wrap:wrap;min-width:240px}
	  .quickfilters span{font-size:11.5px;color:#dce5f0;border:1px solid var(--line2);border-radius:20px;padding:3px 8px;background:rgba(255,255,255,.025);white-space:nowrap}
  .roleintro{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:18px 20px;margin-bottom:16px;color:var(--muted);font-size:14.3px}
  .roleintro strong{color:var(--txt)}
  .rolegrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
  .rolecard{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:16px;min-height:220px}
  .rolecard .lvl{font-family:var(--mono);font-size:11px;color:var(--accent);letter-spacing:.7px;text-transform:uppercase;margin-bottom:7px}
  .rolecard h3{font-size:16px;margin:0 0 3px}
  .rolecard .enrole{font-family:var(--mono);font-size:12.1px;color:var(--muted2);margin-bottom:10px}
  .rolecard p{margin:0 0 9px;color:var(--muted);font-size:13.8px}
  .rolefacts{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:12px 0}
  .rolefact{border:1px solid var(--line2);background:rgba(255,255,255,.025);border-radius:8px;padding:8px;min-width:0}
  .rolefact .fl{font-size:10.8px;color:var(--muted2);letter-spacing:.5px;margin-bottom:3px}
  .rolefact .fv{font-size:12.6px;color:var(--txt);font-weight:800;line-height:1.3}
  .difficulty{display:flex;align-items:center;gap:5px;white-space:nowrap}
  .difficulty i{width:7px;height:7px;border-radius:50%;background:var(--line2);display:block}
  .difficulty i.on{background:var(--accent)}
  .diffreason{font-size:13px;color:#d3dbe8;background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:9px 10px;margin:10px 0}
  .rolecard .prog{border-top:1px dashed var(--line);padding-top:10px;margin-top:11px;color:#cfd8e4}
  .exchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
  .exchips span{font-size:11.6px;border:1px solid var(--line2);border-radius:20px;padding:2px 8px;color:var(--muted)}
  .sourcegrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:10px;margin-top:18px}
  .sourcecard{display:block;text-decoration:none;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px;color:var(--muted)}
  .sourcecard:hover{border-color:var(--accent);color:var(--txt)}
  .sourcecard b{display:block;color:var(--txt);font-size:13.8px;margin-bottom:5px}
  .sourcecard span{font-size:12.7px;line-height:1.45}
  .teamengpanel{margin-top:18px}
  .teamenggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px}
  .teameng{background:var(--bg2);border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .teameng .thd{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line)}
  .teameng .mark{width:5px;height:28px;border-radius:3px}
  .teameng .tn{font-weight:800;font-size:15px}
  .teameng .td{font-size:12px;color:var(--muted);font-family:var(--mono)}
  .roleline{display:grid;grid-template-columns:48px minmax(0,1fr);gap:10px;padding:10px 12px;border-bottom:1px dashed var(--line)}
  .roleline:last-child{border-bottom:0}
  .score{font-family:var(--mono);font-weight:900;color:#0a0c10;background:var(--accent);border-radius:8px;display:grid;place-items:center;height:30px;margin-top:2px}
  .roleline .rt{font-size:13.2px;font-weight:800;color:var(--txt);line-height:1.35}
  .roleline .rp{font-size:12.6px;color:var(--muted);margin-top:3px;line-height:1.45}
  .roleline .rs{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
  .mini{font-size:11.2px;color:#dce5f0;border:1px solid var(--line2);border-radius:20px;padding:1px 7px;background:rgba(255,255,255,.025)}
  .mini.warn{color:#fff0c2;border-color:var(--med);background:rgba(255,176,32,.12)}
  .mini.good{color:#d8ffe8;border-color:var(--hi);background:rgba(55,214,122,.12)}
  .routecoverage{display:grid;gap:10px}
  .routeitem{background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:12px}
  .routeitem h4{margin:0 0 5px;font-size:14.4px;color:var(--txt)}
  .routeitem h4 span{display:block;font-size:11.6px;font-family:var(--mono);font-weight:500;color:var(--accent);margin-top:2px}
  .routeitem .note{font-size:12.8px;color:var(--muted);line-height:1.5;margin:7px 0 9px}
  .routechips{display:flex;flex-wrap:wrap;gap:6px}
  .routechips span{font-size:11.4px;color:#dce5f0;border:1px solid var(--line2);border-radius:20px;padding:1px 7px;background:rgba(255,255,255,.025)}
  .rroles{display:grid;gap:5px}
  .rrole{display:grid;grid-template-columns:34px 1fr;gap:8px;font-size:12.2px;color:var(--muted);line-height:1.35}
  .rrole b{font-family:var(--mono);color:var(--accent)}
  .rrole strong{color:var(--txt)}
  .route-table{display:grid;gap:7px}
  .route-row{display:grid;grid-template-columns:1.15fr .95fr .7fr .65fr;gap:12px;align-items:center;border-bottom:1px dashed var(--line);padding:9px 0;font-size:14.8px}
  .route-row.head{color:var(--muted2);font-size:12.8px;letter-spacing:.5px;text-transform:uppercase}
  .route-row b{color:var(--txt)}
  .route-row span{color:var(--muted)}
  .seriesgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
  .seriescard{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:16px}
  .seriescard h3{margin:0;font-size:17px}
  .seriescard .seas{font-family:var(--mono);font-size:12px;color:var(--accent);margin-top:2px}
  .seriescard .desc{color:var(--muted);font-size:13.5px;margin:11px 0;line-height:1.55}
  .seriescard .classes{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
  .seriescard .classes span{font-size:11.6px;border:1px solid var(--line2);border-radius:20px;padding:2px 8px;color:#dce5f0}
  .seriescard .teams{font-size:12.4px;color:var(--muted);line-height:1.55;max-height:116px;overflow:auto;border:1px solid var(--line);border-radius:8px;padding:8px;background:var(--bg2)}
  .seriescard .ladder{margin-top:12px;border-top:1px dashed var(--line);padding-top:10px}
  .srole{display:grid;grid-template-columns:42px 1fr;gap:9px;padding:6px 0;border-bottom:1px dashed rgba(70,84,108,.55)}
  .srole:last-child{border-bottom:0}
  .srole .sn{font-family:var(--mono);font-size:12px;font-weight:900;color:var(--accent)}
  .srole .sx{font-size:12.6px;color:var(--txt);font-weight:700}
  .srole .sd{font-size:12px;color:var(--muted);line-height:1.4}
	  .seriesboard{display:grid;gap:14px}
	  .rostersection{border:1px solid var(--line);background:rgba(12,17,25,.88);border-radius:8px;overflow:hidden;box-shadow:0 14px 36px rgba(0,0,0,.18)}

<script type="module">
async function loadDashboard(){
  try{
    const res = await fetch("/api/dashboard", {cache:"no-store"});
    if(!res.ok) throw new Error(`API ${res.status}`);
    return await res.json();
  }catch(err){
    if(window.F1DATA) return window.F1DATA;
    throw err;
  }
}
const D = await loadDashboard();

/* ---------- i18n (UI chrome only; data/content stays in source language) ---------- */
const LANGS = [["zh","中文"],["en","English"],["ja","日本語"],["de","Deutsch"],["fr","Français"],["es","Español"],["it","Italiano"]];
const LOCALE = (()=>{
  const known = v => LANGS.some(l=>l[0]===v);
  // 1. URL wins: shared links carry their language (?lang=xx)
  try{
    const q = new URLSearchParams(location.search).get("lang");
    if(known(q)){ try{ localStorage.setItem("locale", q); }catch{} return q; }
  }catch{}
  // 2. remembered explicit choice (localStorage — static site, no server, so no cookie needed)
  try{ const v = localStorage.getItem("locale"); if(known(v)) return v; }catch{}
  // 3. browser language
  try{
    for(const nav of (navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language||""])){
      const b = String(nav||"").toLowerCase();
      if(b.startsWith("zh")) return "zh";
      const hit = LANGS.find(l=>b.startsWith(l[0]));
      if(hit) return hit[0];
    }
  }catch{}
  return "en";
})();
// keep the language visible in the URL so copying the address shares it
try{
  const u = new URL(location.href);
  if(u.searchParams.get("lang") !== LOCALE){
    u.searchParams.set("lang", LOCALE);
    history.replaceState(null, "", u.toString());
  }
}catch{}

/* enum scale values (seniority / difficulty / importance / path position):
   the zh string in the data is the canonical key; SCALES maps it to each
   locale. Content overlays never carry these — this table is the single
   source of truth. */

const CAT_EN = {"电动方程式":"Formula E","WEC / 勒芒 24 小时":"WEC / Le Mans 24h"};
const CJK_RE = /[一-鿿]/;
const zhTok = s => {
  s = String(s||"");
  if(LOCALE==="zh" || !CJK_RE.test(s)) return s;
  return s
    .replace(/^[一-鿿][^\/]*\/\s*(?=[A-Za-z])/, "")
    .replace(/至今/g,"present").replace(/^至/,"until ").replace(/约\s*/g,"c. ")
    .replace(/官网/g,"official site").replace(/媒体图/g,"media photo").replace(/水印图/g,"watermarked")
    .replace(/存档/g,"archive").replace(/本地缓存/g,"local cache")
    .replace(/，/g,", ").replace(/（/g," (").replace(/）/g,")")
    .replace(/\s+/g," ").trim();
};
/* zh-written source titles carry no meaning for non-zh readers: show the host */
const srcLabel = (title, url) => {
  if(LOCALE!=="zh" && CJK_RE.test(String(title||""))){
    try{ return new URL(url).hostname.replace(/^www\./,""); }catch{ return url||""; }
  }
  return title||url||"";
};

function imageUrl(url, fallbackText=""){
  const raw = String(url||"").trim();
  if(!raw) return "";
  if(raw.startsWith("local:")) return localImageUrl(raw.slice(6));
  if(/^https?:\/\//i.test(raw)){
    // static deploys ship a pre-materialized image cache + URL map (imgmap.js);
    // when absent (local dev) fall through to the live api/image proxy.
    const mapped = window.IMGMAP && window.IMGMAP[raw];
    if(mapped) return mapped;
    if(window.IMGMAP) return "";  // static site, un-cached remote image -> initials
    const params = new URLSearchParams({u:raw});
    if(ASSET_VERSION && fallbackText) params.set("v", ASSET_VERSION);
    if(fallbackText) params.set("i", fallbackText);
    return `api/image?${params.toString()}`;
  }
  return localImageUrl(raw);
}

// collapse doubled sentence punctuation ("。。") and stray spaces in a zh note
function cleanZh(t){
  if(!t) return "";
  let s=String(t).replace(/[^\S\n]+/g," ").replace(/\n{2,}/g,"\n").trim();
  s=s.replace(/[。！？；!?;](?:[ \t]*[。！？；!?;])+/g,m=>m.replace(/[ \t]/g,"").slice(-1));
  s=s.replace(/[ \t]+([。！？；，、])/g,"$1");
  return s.trim();
}
// join note fragments into one clean string, no doubled punctuation
function joinZh(parts){
  const out=[];
  (parts||[]).forEach(p=>{ p=cleanZh(p); if(!p) return;
    if(!/[。！？!?；;]$/.test(p)) p+="。"; out.push(p); });
  return cleanZh(out.join(""));
}
// split a long note into ~2-sentence paragraphs for readability
function paras(t){
  t=cleanZh(t); if(!t) return "";
  const parts=[];
  t.split(/\n+/).forEach(block=>{
    const sents=(block.match(/[^。！？!?；;]+[。！？!?；;]*/g)||[block]).map(s=>s.trim()).filter(Boolean);
    let buf="";
    sents.forEach(s=>{
      const next=buf ? buf+s : s;
      if(buf && next.length>96){ parts.push(buf); buf=s; return; }
      buf=next;
      if((/[。！？!?]$/.test(s)&&buf.length>=44)||(/[；;]$/.test(s)&&buf.length>=36)){
        parts.push(buf); buf="";
      }
    });
    if(buf) parts.push(buf);
  });
  return parts.map(p=>`<p>${p}</p>`).join("");
}

function makeSeriesPeople(){

function loadAvatar(el){
  if(!el || el.dataset.loaded==="1" || el.dataset.loading==="1") return;
  const url = el.dataset.bg;
  if(!url) return;
  el.dataset.loading = "1";
  const img = new Image();
  img.decoding = "async";
  img.onload = ()=>{
    el.style.backgroundImage = `url("${url.replace(/"/g,'\\"')}")`;
    if(el.dataset.bgPos) el.style.backgroundPosition = el.dataset.bgPos;
    el.dataset.loaded = "1";
    delete el.dataset.loading;
  };
  img.onerror = ()=>{
    el.dataset.error = "1";
    el.dataset.loaded = "1";
    delete el.dataset.loading;
  };
  img.src = url;
}
function setupLazyAvatars(root=document){

function publicPeopleBlocks(people){

    .sort(([a],[b])=>{

function peopleBlocksByRole(people){

	      </div>
	      <div class="rostergrid"></div>
	    </section>`;
  }).join("");
  ids.forEach(id=>renderRosterSection(id, OPEN_SERIES.has(id)));
}

/* ---------- role map ---------- */
function renderRoles(){
  const data = D.trackside_roles || {};
  const levels = {
    "department":t("lv_department"),
    "car-lead":t("lv_carlead"),
    "car-support":t("lv_carsupport"),
    "shared-trackside":t("lv_shared"),
    "pit-wall":t("lv_pitwall"),
    "factory-feed":t("lv_factory")
  };
  const scopeNote = LOCALE==="zh"
    ? (data.scope_note_zh||data.scope_note||t("scope_fallback"))
    : (OVLY.scope_note||data.scope_note||data.scope_note_zh||t("scope_fallback"));
  const scaleFields = new Set(["importance","seniority","difficulty","path_position"]);
  const rr = (r,f)=>{
    if(LOCALE==="zh") return r[f+"_zh"]||"";
    if(scaleFields.has(f)) return sc(r[f+"_zh"]);
    return ovR(r.key||slug(r.title),f)||r[f+"_zh"]||"";
  };
  document.getElementById("rolescope").innerHTML =
    `<strong>${t("scope_label")}</strong>${scopeNote}`;
  document.getElementById("rolegrid").innerHTML = (data.hierarchy||[]).slice().sort((a,b)=>(b.importance_score||0)-(a.importance_score||0)).map(r=>{
    const examples = (r.examples||[]).map(x=>`<span>${x}</span>`).join("");
    return `<article class="rolecard">
      <div class="lvl">${levels[r.level]||r.level||"role"}</div>
      <h3>${titleRoleHtml(r)}</h3>
      <p>${rr(r,"summary")}</p>
      <div class="rolefacts">
        <div class="rolefact"><div class="fl">${t("rf_importance")}</div><div class="fv">${rr(r,"importance")||t("unmarked")}</div></div>
        <div class="rolefact"><div class="fl">${t("rf_seniority")}</div><div class="fv">${rr(r,"seniority")||t("unmarked")}</div></div>
        <div class="rolefact"><div class="fl">${t("rf_difficulty")}</div><div class="fv">${rr(r,"difficulty")||t("unmarked")}</div></div>
        <div class="rolefact"><div class="fl">${t("rf_path")}</div><div class="fv">${rr(r,"path_position")||t("unmarked")}</div></div>
      </div>
      ${rr(r,"difficulty_reason")?`<div class="diffreason">${rr(r,"difficulty_reason")}</div>`:""}
      <p class="prog"><strong>${t("typical")}</strong>${rr(r,"typical_progression")||t("no_pub")}</p>
      ${examples?`<div class="exchips">${examples}</div>`:""}
    </article>`;
  }).join("");
  document.getElementById("rolesources").innerHTML = (data.sources||[]).map(s=>
    `<a class="sourcecard" href="${s.url}" target="_blank" rel="noopener"><b>${s.title}</b><span>${LOCALE==="zh"?(s.note_zh||s.note||s.url):(s.note||s.note_zh||s.url)}</span></a>`).join("");
}

const scrim=document.getElementById("scrim"), drawer=document.getElementById("drawer");
let lastFocusedRow = null;
function openPerson(id){
  lastFocusedRow = document.activeElement?.closest?.(".personrow") || null;
  const e=PERSON_BY_ID[id]; if(!e) return;
  const a=ARCHE[e.route_archetype]||ARCHE.unknown;
  // no generic identity tags; keep the career-route class (the study's subject)
  // and specific, meaningful facts (nationality, pairing, RE-timeline, low-conf).
  const isPlainRole = e.profile_kind==="leadership"||e.profile_kind==="f1-engineering"||e.profile_kind==="series-person";
  const chips=[
    (!isPlainRole && a.label) ? `<span class="abadge" style="color:#0a0c10;background:${a.color}">${a.label}</span>` : "",
    (e.nationality_zh||e.nationality)?`<span class="badge">${LOCALE==="zh"?(e.nationality_zh||e.nationality):(e.nationality||zhTok(e.nationality_zh))}</span>`:"",
    confBadge(e),
    typeof e.years_to_race_engineer==="number"?`<span class="badge">${t("yrs_to_re", e.years_to_race_engineer)}</span>`:"",
    e.f1_debut_year?`<span class="badge">${t("debut", e.f1_debut_year)}</span>`:"",
  ].filter(Boolean).join("");
  const ageChip = e.age!=null
    ? `<div class="agewrap"><span class="agechip"><span class="al">${t("age_label")}</span><b>${e.age}</b> ${t("age_suffix")}${e.age_approx?`<span class="al">${t("age_approx")}</span>`:""}</span></div>`
    : "";
  const edu=(e.education||[]).length?(e.education).map(ed=>{
    const line2=(LOCALE==="zh"
      ? [ed.degree_zh||ed.degree, ed.field_zh||ed.field]
      : [ed.degree||ed.degree_zh, ed.field||ed.field_zh]).filter(Boolean).join(" · ");
    const extra=[zhTok(ed.years), LOCALE==="zh"?(ed.note_zh||ed.note):(ed.note||ed.note_zh)].filter(Boolean).join(" · ");
    return `<div class="edu"><div class="ei">${nm(ed.institution||"—",ed.institution_zh)}</div>
     ${line2?`<div class="ed">${line2}</div>`:""}
     ${extra?`<div class="ed eyr">${extra}</div>`:""}
     ${(!line2&&!extra)?`<div class="ed">${t("no_detail")}</div>`:""}
     ${ed.source_url?`<a class="edusrc" href="${ed.source_url}" target="_blank" rel="noopener">${t("source_pfx")} · ${srcLabel(ed.source_title, ed.source_url)}</a>`:""}</div>`;
  }).join("")
    :`<div class="notes">${t("not_found")}</div>`;
  const tl=(e.career||[]).length?`<div class="tl">${e.career.map(c=>
    `<div class="tli"><div class="dot" style="background:${catColor(c.category)}"></div>
      <div class="yr">${[c.from,c.to].filter(Boolean).map(zhTok).join(" – ")}</div>
      <div class="org">${nm(zhTok(c.org)||"—",c.org_zh)}<span class="cat">${LOCALE==="zh"?(c.category_zh||c.category||""):(c.category||CAT_EN[c.category_zh]||c.category_zh||"")}</span></div>
      <div class="ro">${roleHtml(c)}</div></div>`).join("")}</div>`
    :`<div class="notes">${t("not_found")}</div>`;
  const ov = ovP(e.id);
  const hlArr=((LOCALE==="zh"
    ? (e.highlights_zh&&e.highlights_zh.length?e.highlights_zh:e.highlights)
    : (ov.highlights&&ov.highlights.length?ov.highlights:(e.highlights||[])))||[]).map(cleanZh).filter(Boolean);
  const notesText = LOCALE==="zh" ? (e.notes_zh||e.notes||"") : (ov.notes||e.notes||e.notes_zh||"");
  const notesStr=cleanZh(notesText);
  // suppress 高光时刻 when it merely re-lists the research-notes content
  const hls=(hlArr.length && joinZh(hlArr)!==notesStr) ? hlArr.map(h=>`<div class="hl">${h}</div>`).join("") : "";
  const p=e.photo;
  const provLabel = p ? (p.provenance==="wikimedia"?t("free_license"):t("media_photo")) : "";
  const remotePhotoRaw = (p&&p.src_img) || e.photo_url || "";
  const drawerInitials = initials(e.name||"?");
  const drawerPhotoAttrs = `alt="${escAttr(e.name)}" loading="lazy" decoding="async" data-fallback-color="${escAttr(e.team_color||"var(--accent)")}"`;
  const dav = p&&p.local
    ? `<div><img class="dav" src="${escAttr(imageUrl(p.local, drawerInitials))}" ${drawerPhotoAttrs}>${(p.license||p.credit)?`<div class="dcap">${provLabel}${p.license?(" · "+p.license):""}</div>`:""}</div>`
    : remotePhotoRaw
    ? `<div><img class="dav" src="${escAttr(imageUrl(remotePhotoRaw, drawerInitials))}" ${drawerPhotoAttrs}>${(p?.credit||e.photo_credit)?`<div class="dcap">${zhTok(p?.credit||e.photo_credit)}</div>`:""}</div>`
    : `<div class="dav ph" style="background:${e.team_color}">${drawerInitials}</div>`;
  const photoSrc = p&&p.src_page
    ? `<a class="src" href="${p.src_page}" target="_blank" rel="noopener"><span class="st">${p.provenance==="wikimedia"?t("photo_free"):t("photo_media")}</span>${zhTok(p.credit)||p.src_page}${p.license?(" · "+p.license):""}</a>`
    : e.profile_source_url
    ? `<a class="src" href="${e.profile_source_url}" target="_blank" rel="noopener"><span class="st">${t("photo_profile")}</span>${zhTok(e.photo_credit)||e.profile_source_url}</a>`
    : "";
  const srcs=photoSrc+(e.sources||[]).map(s=>
    `<a class="src" href="${s.url}" target="_blank" rel="noopener"><span class="st">${s.type||"link"}</span>${srcLabel(s.title, s.url)}</a>`).join("");
  const drawerNick = e.aka&&e.aka.length ? `<div class="dnick">${t("aka")}${e.aka.join(" / ")}</div>` : "";
	  drawer.innerHTML=`
	    <div class="dh"><div class="stripe" style="background:${e.team_color}"></div>
	      <button class="close" id="dclose" aria-label="${t("close_aria")}">✕</button>
	      <div class="dhrow">${dav}
        <div>
          <div class="dn">${nm(e.name,e.name_zh)}</div>
          ${drawerNick}
          <div class="drole">${roleHtml(e)}<span class="role-meta">${nm(e.team_2026,e.team_zh)} · ${driversBi(e)}</span></div>
        </div>
      </div>
      ${ageChip}
      <div class="chips">${chips}</div>
    </div>
    <div class="dbody">
      <div class="sec"><div class="lab edulab">${t("lab_edu")}</div>${edu}</div>
      <div class="sec"><div class="lab">${t("lab_career")}</div>${tl}</div>
      ${(!isPlainRole && a.desc)?`<div class="sec"><div class="lab">${t("lab_route")}</div><div style="font-size:14.3px;color:#cfd8e4">${a.desc}</div></div>`:""}
      ${hls?`<div class="sec"><div class="lab">${t("lab_highlights")}</div>${hls}</div>`:""}
      ${notesText?`<div class="sec"><div class="lab">${t("lab_notes")}</div><div class="notes">${paras(notesText)}</div></div>`:""}
      ${srcs?`<div class="sec"><div class="lab">${t("lab_sources")}</div>${srcs}</div>`:""}
    </div>`;
  drawer.classList.add("on");
  scrim.classList.add("on");
	  document.getElementById("dclose").onclick=closeEng;
	}
function closeEng(){
  drawer.classList.remove("on");scrim.classList.remove("on");

  lastFocusedRow = null;
}

  const ph = document.createElement("div");
  ph.className = "dav ph";

document.getElementById("rosterboard").addEventListener("click",e=>{

/* ---------- routes view ---------- */
(function(){
  const counts=PATH_ENG.reduce((m,e)=>{m[e.route_archetype]=(m[e.route_archetype]||0)+1;return m;},{});
  const max=Math.max(...Object.values(counts),1);
  document.getElementById("archebars").innerHTML=Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([k,n])=>{
    const a=ARCHE[k]||ARCHE.unknown;
    return `<div class="bar"><div class="bl"><span class="bn" style="color:${a.color}">${a.label}<span class="cnt">${t("unit_people",n)}</span></span>
      <span class="bd">${a.desc}</span></div>
      <div class="track"><div class="fill" style="width:${n/max*100}%;background:${a.color}"></div></div></div>`;
  }).join("");

  const uni={};
  PATH_ENG.forEach(e=>(e.education||[]).forEach(ed=>{
    if(!ed.institution) return;
    let key=ed.institution.replace(/\(.*?\)/g,"").replace(/University of /i,"").replace(/\s*University$/i,"").trim();
    if(!uni[key]) uni[key]={en:key,zh:ed.institution_zh||"",count:0};
    uni[key].count++; if(!uni[key].zh&&ed.institution_zh) uni[key].zh=ed.institution_zh;
  }));
  const us=Object.values(uni).sort((a,b)=>b.count-a.count);
  document.getElementById("unis").innerHTML=us.map(u=>
    `<div class="uni"><span class="un">${nm(u.en,u.zh)}</span><span class="uc">${"●".repeat(u.count)} ${u.count}</span></div>`).join("")||`<div class="empty">—</div>`;

  const rmap = roleTemplateMap();
  document.getElementById("seriespath").innerHTML = (D.motorsport_series||[]).map(s=>{
    const sourceMap = s.id==="f1" ? rmap.f1 : rmap.series;
    const roles = (s.role_ladder||[])
      .map(k=>sourceMap[k]||rmap.f1[k]||rmap.series[k]||{key:k,title_zh:k,importance_score:"—",why_zh:""})
      .sort((a,b)=>(Number(b.importance_score)||0)-(Number(a.importance_score)||0))
      ;
    const entryCount = s.id==="f1" ? D.team_count : (s.teams||[]).length;
    return `<div class="routeitem">
      <h4>${seriesTitle(s)}<span>${t("entries_count",entryCount)}</span></h4>
      <div class="rroles">${roles.map(r=>`<div class="rrole"><b>•</b><span><strong>${titleRoleHtml(r)}</strong> · ${[sc(r.seniority_zh),sc(r.difficulty_zh)].filter(Boolean).join(" · ")}</span></div>`).join("")}</div>
    </div>`;
  }).join("");

  document.getElementById("routepeople").innerHTML = [
    `<div class="route-row head"><span>${t("head_name")}</span><span>${t("head_role")}</span><span>${t("head_entry")}</span><span>${t("head_years")}</span></div>`,
    ...PATH_ENG.slice().sort((a,b)=>a.years_to_race_engineer-b.years_to_race_engineer).map(e=>{
      const a=ARCHE[e.route_archetype]||ARCHE.unknown;
      return `<div class="route-row"><b>${nm(e.name,e.name_zh)}</b><span>${roleHtml(e)}</span><span>${e.f1_debut_year||""}</span><span>${t("unit_years",e.years_to_race_engineer)} · ${a.label}</span></div>`;
    })
  ].join("");

  const yrs=PATH_ENG.map(e=>e.years_to_race_engineer).sort((a,b)=>a-b);
  const buckets=[[t("bucket","0–4"),0],[t("bucket","5–8"),0],[t("bucket","9–12"),0],[t("bucket","13+"),0]];
  yrs.forEach(y=> y<=4?buckets[0][1]++ : y<=8?buckets[1][1]++ : y<=12?buckets[2][1]++ : buckets[3][1]++);
  const bmax=Math.max(...buckets.map(b=>b[1]),1);
  document.getElementById("ydist").innerHTML=buckets.map(b=>
    `<div class="yb" style="height:${b[1]/bmax*100}%"><span>${b[1]}</span><i>${b[0]}</i></div>`).join("");
  const median=yrs.length%2?yrs[(yrs.length-1)/2]:Math.round((yrs[yrs.length/2-1]+yrs[yrs.length/2])/2);
  document.getElementById("ystat").innerHTML=t("ystat", median, yrs[0], yrs[yrs.length-1], yrs.length);

  const topUni=us.slice(0,5).map(u=>(LOCALE==="zh"?(u.zh||u.en):u.en)).join(LOCALE==="zh"?"、":", ");
  const steps=t("playbook", topUni, median);
  document.getElementById("playbook").innerHTML=steps.map((s,i)=>
    `<div class="step"><div class="num">${i+1}</div><div><div class="st">${s[0]}</div><div class="sd">${s[1]}</div></div></div>`).join("");
})();

function renderPathChart(){
  const host=document.getElementById("pathchart");
  const groups={};
  PATH_ENG.forEach(e=>{
    const k=e.route_archetype;
    if(!groups[k]) groups[k]=[];
    groups[k].push(e.years_to_race_engineer);
  });
  const maxYear=Math.max(18,...PATH_ENG.map(e=>e.years_to_race_engineer));
  const w=760,h=320,pl=54,pr=154,pt=24,pb=48;
  const iw=w-pl-pr, ih=h-pt-pb;
  const sx=x=>pl+(x/maxYear)*iw;
  const sy=p=>pt+(1-p/100)*ih;
  const yTicks=[0,25,50,75,100];
  const xTicks=[0,4,8,12,16,maxYear].filter((v,i,a)=>v<=maxYear&&a.indexOf(v)===i);
  const grid=[
    ...yTicks.map(y=>`<line class="gridline" x1="${pl}" y1="${sy(y)}" x2="${pl+iw}" y2="${sy(y)}"></line><text class="charttext" x="${pl-10}" y="${sy(y)+4}" text-anchor="end">${y}%</text>`),
    ...xTicks.map(x=>`<line class="gridline" x1="${sx(x)}" y1="${pt}" x2="${sx(x)}" y2="${pt+ih}"></line><text class="charttext" x="${sx(x)}" y="${pt+ih+22}" text-anchor="middle">${x}</text>`)
  ].join("");
  const lines=Object.entries(groups).sort((a,b)=>b[1].length-a[1].length).map(([k,vals],idx)=>{
    const a=ARCHE[k]||ARCHE.unknown;
    vals=vals.slice().sort((x,y)=>x-y);
    const pts=[];
    for(let x=0;x<=maxYear;x++){
      const pct=vals.filter(v=>v<=x).length/vals.length*100;
      pts.push([sx(x),sy(pct)]);
    }
    const d=pts.map((p,i)=>`${i?"L":"M"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
    const last=pts[pts.length-1];
    return `<path d="${d}" fill="none" stroke="${a.color}" stroke-width="3" stroke-linecap="round"></path>
      ${vals.map(v=>`<circle cx="${sx(v)}" cy="${sy(vals.filter(x=>x<=v).length/vals.length*100)}" r="3.5" fill="${a.color}"></circle>`).join("")}
      <text class="chartlabel" x="${last[0]+10}" y="${last[1]+4+(idx%4-1.5)*13}" fill="${a.color}">${a.badge} · ${vals.length}</text>`;
  }).join("");
  host.innerHTML=`<svg viewBox="0 0 ${w} ${h}" role="img" aria-label="${t("chart_aria")}">
    ${grid}
    <line class="axis" x1="${pl}" y1="${pt}" x2="${pl}" y2="${pt+ih}"></line>
    <line class="axis" x1="${pl}" y1="${pt+ih}" x2="${pl+iw}" y2="${pt+ih}"></line>
    ${lines}
    <text class="charttext" x="${pl+iw/2}" y="${h-8}" text-anchor="middle">${t("chart_x")}</text>
    <text class="charttext" transform="translate(14 ${pt+ih/2}) rotate(-90)" text-anchor="middle">${t("chart_y")}</text>
  </svg>`;
}
